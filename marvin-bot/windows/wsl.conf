# wsl.conf — WSL2 configuration for HELM
# INSTRUCTIONS: Copy this file to /etc/wsl.conf inside your WSL2 instance.
#   From PowerShell:  wsl -e sudo cp /mnt/c/path/to/wsl.conf /etc/wsl.conf
#   Then restart WSL: wsl --shutdown  (then reopen your terminal)
# After restarting, systemd will be your init system inside WSL2.

[boot]
systemd=true

[automount]
enabled=true
root=/mnt/
options="metadata,umask=22,fmask=11"

[network]
generateHosts=true
generateResolvConf=true

[interop]
enabled=true
appendWindowsPath=true
